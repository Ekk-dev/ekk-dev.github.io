	gap:20px;
	flex-wrap:wrap;
	margin-top:50px;
}

.pic {
	text-align:center;
}

.pic img {
	cursor:pointer;
	transition:0.3s;
}

.pic img:hover {
	transform:scale(1.03);
}

/* LIGHTBOX */

.lightbox-target {
	position:fixed;
	top:0;
	left:0;
	width:100%;
	height:100%;
	background:rgba(0,0,0,0.88);
	display:none;
	justify-content:center;
	align-items:center;
	z-index:999;
}

.lightbox-target:target {
	display:flex;
}

.lightbox-target img {
	max-width:90%;
	max-height:90vh;
}

.lightbox-close {
	position:absolute;
	top:20px;
	right:30px;
	font-size:40px;
	color:white;
	text-decoration:none;
}

.next {
	position:absolute;
	right:30px;
	top:50%;
	transform:translateY(-50%);
	font-size:70px;
	color:white;
	text-decoration:none;
}

.next:hover {
	color:#67926E;
	transform:translateY(-50%) scale(1.2);
}

</style>
