/* ================= LIGHTBOX ================= */

.lightbox-target {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	background: rgba(0,0,0,0.88);
	display: none;
	justify-content: center;
	align-items: center;
	z-index: 999;
}

.lightbox-target:target {
	display: flex;
}

.lightbox-target img {
	max-width: 90%;
	max-height: 90vh;
	box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* CLOSE BUTTON */

.lightbox-close {
	position: absolute;
	top: 20px;
	right: 30px;
	font-size: 40px;
	color: white;
	text-decoration: none;
}

/* NEXT BUTTON */

.next {
	position: absolute;
	right: 30px;
	top: 50%;
	transform: translateY(-50%);
	font-size: 70px;
	color: white;
	text-decoration: none;
	padding: 10px;
	transition: 0.2s;
}

.next:hover {
	color: #67926E;
	transform: translateY(-50%) scale(1.2);
}
