body {

 height: 1800px;

nav{

header {

	top: 0;

	overflow: auto;

main{
	display:flex;
	justify-content:center;
	gap:30px;
	margin-top:150px;

	padding: 50px;

button {
  padding: 17px 40px;
  border-radius: 50px;
  cursor: pointer;
  border: 0;
  background-color:#FFE6AE;
  transition: all 0.5s ease;
  font-family: "Cabin", sans-serif;
  font-weight: 600;
}

button:hover {
  background-color: #67926E;
  color: white;
}

h1{
	font-size: 150px;
	color: #f04830;
	text-align: center;
	font-family: "Major Mono Display", monospace;
}

.images {
	display: flex;
	justify-content: center;
	gap: 20px;
	flex-wrap: wrap;
	margin-top: 50px;
}

.pic {
	text-align: center;
}

.pic img {
	cursor: pointer;
	transition: 0.3s;
}

.pic img:hover {
	transform: scale(1.03);
}

/* LIGHTBOX */

.lightbox-target {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	background: rgba(0,0,0,0.88);
	display: none;
	justify-content: center;
	align-items: center;
	z-index: 999;
}

.lightbox-target:target {
	display: flex;
}

.lightbox-target img {
	max-width: 90%;
	max-height: 90vh;
}

.lightbox-close {
	position: absolute;
	top: 20px;
	right: 30px;
	font-size: 40px;
	color: white;
	text-decoration: none;
}

.next {
	position: absolute;
	right: 30px;
	top: 50%;
	transform: translateY(-50%);
	font-size: 70px;
	color: white;
	text-decoration: none;
}

.next:hover {
	color: #67926E;
}

</style>

</head>
